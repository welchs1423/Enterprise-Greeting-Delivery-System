# EGDS Enterprise CI/CD Pipeline — 20-Stage
#
# Stages (sequential unless marked parallel):
#   Stage  1: checkout
#   Stage  2: jdk-setup
#   Stage  3: dependency-cache
#   Stage  4: code-quality          [parallel group A]
#   Stage  5: sast-codeql           [parallel group A]
#   Stage  6: dependency-audit      [parallel group A]
#   Stage  7: compile
#   Stage  8: unit-test
#   Stage  9: integration-test
#   Stage 10: grpc-integration-test
#   Stage 11: coverage-enforce
#   Stage 12: build-artifact
#   Stage 13: sbom-generate
#   Stage 14: docker-build
#   Stage 15: container-scan
#   Stage 16: artifact-sign
#   Stage 17: push-registry
#   Stage 18: performance-profile
#   Stage 19: k8s-manifest-validate
#   Stage 20: deploy-staging + smoke-test + notify
#
# Required repository secrets:
#   GHCR_TOKEN          — GitHub Container Registry write token
#   COSIGN_PRIVATE_KEY  — Sigstore cosign private key (generate: cosign generate-key-pair)
#   COSIGN_PASSWORD     — Passphrase for COSIGN_PRIVATE_KEY
#   STAGING_KUBECONFIG  — base64-encoded kubeconfig for the staging cluster
#   SLACK_WEBHOOK_URL   — Slack incoming webhook for pipeline notifications

name: EGDS Enterprise Pipeline

on:
  push:
    branches: [ "master", "release/**" ]
  pull_request:
    branches: [ "master" ]

env:
  JAVA_VERSION: "17"
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/enterprise-greeting-delivery-system
  MAVEN_OPTS: "-Xmx2g -XX:+TieredCompilation -XX:TieredStopAtLevel=1"

jobs:

  # ─────────────────────────────────────────────
  # Stage 1–3: Checkout, JDK, Dependency Cache
  # ─────────────────────────────────────────────
  prepare:
    name: "Stage 1-3: Checkout / JDK / Dependency Cache"
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.maven-cache.outputs.cache-hit }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      # Stage 1: Checkout
      - name: "[Stage 1] Checkout source"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history required for SonarQube blame analysis

      # Stage 2: JDK setup
      - name: "[Stage 2] Set up JDK ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Stage 3: Dependency cache warm-up
      - name: "[Stage 3] Warm Maven dependency cache"
        id: maven-cache
        run: mvn dependency:go-offline -B -q

      # Derive image tag from git ref for downstream jobs
      - name: "[Stage 3] Derive image tag"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

  # ─────────────────────────────────────────────
  # Stage 4: Code Quality (parallel group A)
  # ─────────────────────────────────────────────
  code-quality:
    name: "Stage 4: Code Quality (Checkstyle / PMD / SpotBugs)"
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 4] Run Checkstyle"
        run: mvn checkstyle:check -B -q
      - name: "[Stage 4] Run PMD"
        run: mvn pmd:check -B -q
      - name: "[Stage 4] Run SpotBugs"
        run: mvn spotbugs:check -B -q

  # ─────────────────────────────────────────────
  # Stage 5: SAST — CodeQL (parallel group A)
  # ─────────────────────────────────────────────
  sast-codeql:
    name: "Stage 5: SAST — CodeQL Static Analysis"
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 5] Initialize CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality
      - name: "[Stage 5] Autobuild for CodeQL"
        uses: github/codeql-action/autobuild@v3
      - name: "[Stage 5] Run CodeQL analysis"
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  # ─────────────────────────────────────────────
  # Stage 6: Dependency Vulnerability Audit (parallel group A)
  # ─────────────────────────────────────────────
  dependency-audit:
    name: "Stage 6: Dependency Audit (OWASP)"
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 6] OWASP Dependency-Check"
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.owasp-suppressions.xml \
            -B -q
      - name: "[Stage 6] Upload dependency-check report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

  # ─────────────────────────────────────────────
  # Stage 7: Compile (protobuf generate-sources + javac)
  # ─────────────────────────────────────────────
  compile:
    name: "Stage 7: Compile (protobuf + javac)"
    runs-on: ubuntu-latest
    needs: [ code-quality, sast-codeql, dependency-audit ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 7] Generate protobuf sources and compile"
        run: mvn compile -B -q
      - name: "[Stage 7] Cache compiled classes"
        uses: actions/cache@v4
        with:
          path: target/classes
          key: classes-${{ github.sha }}

  # ─────────────────────────────────────────────
  # Stage 8: Unit Tests
  # ─────────────────────────────────────────────
  unit-test:
    name: "Stage 8: Unit Tests"
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 8] Run unit tests"
        run: |
          mvn test -B \
            -Dtest="JwtTokenProviderTest,GreetingEventPublisherTest" \
            -DfailIfNoTests=false
      - name: "[Stage 8] Publish unit test results"
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
          check_name: "Unit Test Results"

  # ─────────────────────────────────────────────
  # Stage 9: Integration Tests
  # ─────────────────────────────────────────────
  integration-test:
    name: "Stage 9: Integration Tests (Kafka + JPA + Security)"
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 9] Run integration tests"
        run: |
          mvn test -B \
            -Dtest="SecurityLayerTest,AuditLogServiceTest,GreetingCacheServiceTest,GreetingEventConsumerIntegrationTest,GreetingDeliveryIntegrationTest" \
            -DfailIfNoTests=false
      - name: "[Stage 9] Publish integration test results"
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
          check_name: "Integration Test Results"

  # ─────────────────────────────────────────────
  # Stage 10: gRPC Integration Tests
  # ─────────────────────────────────────────────
  grpc-integration-test:
    name: "Stage 10: gRPC Integration Tests"
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 10] Run gRPC integration tests"
        run: |
          mvn test -B \
            -Dtest="GreetingGrpcServiceIntegrationTest" \
            -DfailIfNoTests=false
      - name: "[Stage 10] Publish gRPC test results"
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
          check_name: "gRPC Integration Test Results"

  # ─────────────────────────────────────────────
  # Stage 11: Coverage Enforcement (JaCoCo)
  # ─────────────────────────────────────────────
  coverage-enforce:
    name: "Stage 11: Coverage Enforcement (JaCoCo ≥ 80%)"
    runs-on: ubuntu-latest
    needs: [ unit-test, integration-test, grpc-integration-test ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 11] Run all tests with JaCoCo coverage"
        run: mvn verify -B -P coverage
      - name: "[Stage 11] Enforce 80% line coverage threshold"
        run: mvn jacoco:check -B
      - name: "[Stage 11] Upload coverage report"
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Stage 12: Build Artifact (fat JAR)
  # ─────────────────────────────────────────────
  build-artifact:
    name: "Stage 12: Build Artifact (Spring Boot fat JAR)"
    runs-on: ubuntu-latest
    needs: coverage-enforce
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 12] Package fat JAR"
        run: mvn package -DskipTests -B
      - name: "[Stage 12] Upload JAR artifact"
        uses: actions/upload-artifact@v4
        with:
          name: egds-jar
          path: target/enterprise-greeting-delivery-system-*.jar
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 13: SBOM Generation (CycloneDX)
  # ─────────────────────────────────────────────
  sbom-generate:
    name: "Stage 13: SBOM Generation (CycloneDX)"
    runs-on: ubuntu-latest
    needs: build-artifact
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 13] Generate CycloneDX SBOM"
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom -B -q
      - name: "[Stage 13] Upload SBOM"
        uses: actions/upload-artifact@v4
        with:
          name: egds-sbom
          path: target/bom.json
          retention-days: 90

  # ─────────────────────────────────────────────
  # Stage 14: Docker Build (multi-stage)
  # ─────────────────────────────────────────────
  docker-build:
    name: "Stage 14: Docker Build (multi-stage)"
    runs-on: ubuntu-latest
    needs: sbom-generate
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: "[Stage 14] Download JAR artifact"
        uses: actions/download-artifact@v4
        with:
          name: egds-jar
          path: target/
      - name: "[Stage 14] Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
      - name: "[Stage 14] Build container image (no push)"
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/egds-image.tar
      - name: "[Stage 14] Upload image tarball"
        uses: actions/upload-artifact@v4
        with:
          name: egds-image
          path: /tmp/egds-image.tar
          retention-days: 1

  # ─────────────────────────────────────────────
  # Stage 15: Container Vulnerability Scan (Trivy)
  # ─────────────────────────────────────────────
  container-scan:
    name: "Stage 15: Container Vulnerability Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: "[Stage 15] Download image tarball"
        uses: actions/download-artifact@v4
        with:
          name: egds-image
          path: /tmp/
      - name: "[Stage 15] Load image into Docker daemon"
        run: docker load --input /tmp/egds-image.tar
      - name: "[Stage 15] Run Trivy vulnerability scan"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          exit-code: 1    # fail the pipeline on CRITICAL or HIGH CVEs
      - name: "[Stage 15] Upload Trivy SARIF to GitHub Security tab"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────
  # Stage 16: Artifact Signing (cosign)
  # ─────────────────────────────────────────────
  artifact-sign:
    name: "Stage 16: Artifact Signing (cosign)"
    runs-on: ubuntu-latest
    needs: container-scan
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: "[Stage 16] Install cosign"
        uses: sigstore/cosign-installer@v3
      - name: "[Stage 16] Log in to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: "[Stage 16] Download image tarball"
        uses: actions/download-artifact@v4
        with:
          name: egds-image
          path: /tmp/
      - name: "[Stage 16] Load and push image for signing"
        run: |
          docker load --input /tmp/egds-image.tar
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: "[Stage 16] Sign container image with cosign"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────────────────────
  # Stage 17: Push to Container Registry
  # ─────────────────────────────────────────────
  push-registry:
    name: "Stage 17: Push Signed Image to GHCR"
    runs-on: ubuntu-latest
    needs: artifact-sign
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: "[Stage 17] Log in to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: "[Stage 17] Re-tag image with semantic version"
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: "[Stage 17] Push all tags"
        run: |
          docker load --input /tmp/egds-image.tar || true
          docker tag \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ steps.meta.outputs.tags }}
          docker push --all-tags ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}

  # ─────────────────────────────────────────────
  # Stage 18: Performance Profiling (JMH)
  # ─────────────────────────────────────────────
  performance-profile:
    name: "Stage 18: Performance Profiling (JMH Microbenchmark)"
    runs-on: ubuntu-latest
    needs: build-artifact
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: "[Stage 18] Run JMH benchmarks (warmup=1, measurement=3)"
        run: |
          mvn test -B -P benchmark \
            -Djmh.warmupIterations=1 \
            -Djmh.measurementIterations=3 \
            -Djmh.forks=1 \
            -DfailIfNoTests=false
      - name: "[Stage 18] Upload benchmark results"
        uses: actions/upload-artifact@v4
        with:
          name: jmh-benchmark-results
          path: target/jmh-result.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # Stage 19: Kubernetes Manifest Validation
  # ─────────────────────────────────────────────
  k8s-manifest-validate:
    name: "Stage 19: K8s Manifest Validation (kubeconform + conftest)"
    runs-on: ubuntu-latest
    needs: build-artifact
    steps:
      - uses: actions/checkout@v4
      - name: "[Stage 19] Install kubeconform"
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/
      - name: "[Stage 19] Validate K8s manifests with kubeconform"
        run: |
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            k8s/deployment.yaml \
            k8s/hpa.yaml \
            k8s/service.yaml \
            k8s/configmap.yaml \
            k8s/networkpolicy.yaml
      - name: "[Stage 19] Install conftest for policy validation"
        run: |
          curl -sSLo conftest.tar.gz \
            https://github.com/open-policy-agent/conftest/releases/latest/download/conftest_Linux_x86_64.tar.gz
          tar xf conftest.tar.gz
          sudo mv conftest /usr/local/bin/
      - name: "[Stage 19] Run OPA/Rego policy checks on manifests"
        run: |
          conftest test k8s/ --policy policy/ --all-namespaces || true

  # ─────────────────────────────────────────────
  # Stage 20: Deploy to Staging + Smoke Test + Notify
  # ─────────────────────────────────────────────
  deploy-and-notify:
    name: "Stage 20: Deploy Staging / Smoke Test / Notify"
    runs-on: ubuntu-latest
    needs: [ push-registry, performance-profile, k8s-manifest-validate ]
    if: github.ref == 'refs/heads/master'
    environment:
      name: staging
      url: https://egds.staging.example.internal
    steps:
      - uses: actions/checkout@v4

      # Deploy to staging Kubernetes cluster
      - name: "[Stage 20] Configure kubectl for staging"
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: "[Stage 20] Apply K8s manifests to staging namespace"
        run: |
          kubectl apply -f k8s/configmap.yaml -n egds-staging
          kubectl apply -f k8s/secret.yaml -n egds-staging
          kubectl apply -f k8s/deployment.yaml -n egds-staging
          kubectl apply -f k8s/service.yaml -n egds-staging
          kubectl apply -f k8s/hpa.yaml -n egds-staging
          kubectl apply -f k8s/networkpolicy.yaml -n egds-staging
          kubectl set image deployment/egds \
            egds=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n egds-staging
      - name: "[Stage 20] Wait for rollout to complete"
        run: |
          kubectl rollout status deployment/egds -n egds-staging --timeout=180s

      # Smoke test: obtain a JWT and call the greeting endpoint
      - name: "[Stage 20] Smoke test — JWT issuance"
        run: |
          TOKEN=$(curl -sf -X POST \
            https://egds.staging.example.internal/api/v1/auth/token \
            -H "Content-Type: application/json" \
            -d '{"username":"greeting.admin","password":"egds-admin-pass"}' \
            | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Smoke test FAILED: JWT not issued"
            exit 1
          fi
          echo "SMOKE_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: "[Stage 20] Smoke test — greeting delivery (HTTP)"
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://egds.staging.example.internal/api/v1/greeting \
            -H "Authorization: Bearer $SMOKE_TOKEN")
          if [ "$STATUS" != "202" ]; then
            echo "Smoke test FAILED: expected 202, got $STATUS"
            exit 1
          fi
          echo "Smoke test PASSED: HTTP 202 received"

      # Notify on success or failure
      - name: "[Stage 20] Notify Slack on success"
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "[EGDS] Pipeline PASSED. Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }} | Deployed to staging."
            }

      - name: "[Stage 20] Notify Slack on failure"
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "[EGDS] Pipeline FAILED. Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }} | Job: ${{ github.job }}"
            }
