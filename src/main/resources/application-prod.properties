# ---------------------------------------------------------------------------
# EGDS Production Profile - Oracle Database / Redis Cache / Kafka Cluster
# Activate with: --spring.profiles.active=prod
# All sensitive values must be supplied via environment variables.
# ---------------------------------------------------------------------------

# --- Oracle Data Source ---
spring.datasource.url=jdbc:oracle:thin:@${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}:${ORACLE_SID:EGDSDB}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${ORACLE_USER}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# H2 console must be disabled in production
spring.h2.console.enabled=false

# --- Kafka Cluster ---
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# --- Redis Cache ---
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# --- JWT ---
egds.security.jwt.secret=${JWT_SECRET}
egds.security.jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# --- Kafka Topics ---
egds.kafka.topic.greeting=${KAFKA_TOPIC_GREETING:egds.greeting.events}
