# ---------------------------------------------------------------------------
# EGDS Application Configuration - Local / CI Development Profile
# Production (Oracle + Redis + Kafka Cluster): activate "prod" profile
# ---------------------------------------------------------------------------

# --- Data Source (H2 simulating Oracle schema in local/CI environments) ---
spring.datasource.url=jdbc:h2:mem:egdsdb;DB_CLOSE_DELAY=-1;MODE=Oracle;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console (local dev only; disable in any deployed environment)
spring.h2.console.enabled=true

# --- Kafka ---
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=egds-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.egds.messaging
spring.kafka.consumer.properties.spring.json.value.default.type=com.egds.messaging.GreetingEvent

# --- Cache (ConcurrentMapCacheManager simulating Redis in local/CI environments) ---
spring.cache.type=simple

# --- JWT ---
egds.security.jwt.secret=egds-enterprise-zero-trust-jwt-secret-key-minimum-256bits-2026
egds.security.jwt.expiration=3600000

# --- Kafka Topics ---
egds.kafka.topic.greeting=egds.greeting.events

# --- gRPC ---
# GrpcServerSecurityAutoConfiguration requires a GrpcAuthenticationReader bean.
# Transport-level security is delegated to Istio mTLS (DestinationRule: ISTIO_MUTUAL).
# Spring Security JWT guards the REST layer; no separate gRPC-level interceptor is needed.
spring.autoconfigure.exclude=net.devh.boot.grpc.server.autoconfigure.GrpcServerSecurityAutoConfiguration

# --- gRPC Server ---
# Binds the Netty-based gRPC server to port 9090 alongside the HTTP server on 8080.
# Set to -1 to disable the network listener (use in-process mode for tests).
grpc.server.port=9090

# --- gRPC Client (self-referential; used by GreetingGrpcClient for local integration tests) ---
# In a real multi-service deployment this address points to a peer service, not localhost.
grpc.client.egds-greeting-service.address=static://localhost:9090
grpc.client.egds-greeting-service.negotiation-type=plaintext

# ---------------------------------------------------------------------------
# Phase 4: Observability, Resilience, Self-Healing Infrastructure
# ---------------------------------------------------------------------------

# --- Spring Application Name (used by OTel resource attributes) ---
spring.application.name=egds

# --- Actuator ---
# Exposes health, prometheus, and info endpoints on the management port.
management.endpoints.web.exposure.include=health,prometheus,info,metrics
management.endpoint.health.show-details=when-authorized
# Enables /actuator/health/liveness and /actuator/health/readiness probes.
management.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Liveness group: verifies the JVM is alive and not deadlocked.
management.endpoint.health.group.liveness.include=livenessState,diskSpace
# Readiness group: verifies all dependencies are operational.
# kafka: built-in Spring Kafka health indicator.
# consoleOutputCircuitBreaker/kafkaPublishCircuitBreaker/consumerPipelineCircuitBreaker:
#   registered by Resilience4j when registerHealthIndicator=true.
management.endpoint.health.group.readiness.include=\
  readinessState,\
  kafka,\
  consoleOutputCircuitBreaker,\
  kafkaPublishCircuitBreaker,\
  consumerPipelineCircuitBreaker

# --- Prometheus ---
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.\
  http.server.requests=true

# --- Micrometer Tracing (OTel bridge) ---
# Sample every request. Reduce in production if trace volume is excessive.
management.tracing.sampling.probability=1.0
# OTel resource attributes attached to every emitted span.
management.opentelemetry.resource-attributes.service.name=egds
management.opentelemetry.resource-attributes.service.version=4.0.0
management.opentelemetry.resource-attributes.deployment.environment=local

# Logging pattern: include traceId and spanId from MDC for log correlation.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level\
  %logger{36} traceId=%X{traceId:-} spanId=%X{spanId:-} - %msg%n

# ---------------------------------------------------------------------------
# Resilience4j Circuit Breakers
# ---------------------------------------------------------------------------

# consoleOutput: guards System.out write path.
resilience4j.circuitbreaker.instances.consoleOutput\
  .sliding-window-size=10
resilience4j.circuitbreaker.instances.consoleOutput\
  .failure-rate-threshold=50
resilience4j.circuitbreaker.instances.consoleOutput\
  .wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.consoleOutput\
  .permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.consoleOutput\
  .automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.consoleOutput\
  .register-health-indicator=true

# kafkaPublish: guards Kafka producer send path.
resilience4j.circuitbreaker.instances.kafkaPublish\
  .sliding-window-size=20
resilience4j.circuitbreaker.instances.kafkaPublish\
  .failure-rate-threshold=40
resilience4j.circuitbreaker.instances.kafkaPublish\
  .wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.kafkaPublish\
  .permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.kafkaPublish\
  .automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.kafkaPublish\
  .register-health-indicator=true

# consumerPipeline: guards Kafka consumer → pipeline execution path.
resilience4j.circuitbreaker.instances.consumerPipeline\
  .sliding-window-size=10
resilience4j.circuitbreaker.instances.consumerPipeline\
  .failure-rate-threshold=60
resilience4j.circuitbreaker.instances.consumerPipeline\
  .wait-duration-in-open-state=45s
resilience4j.circuitbreaker.instances.consumerPipeline\
  .permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.consumerPipeline\
  .automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.consumerPipeline\
  .register-health-indicator=true

# ---------------------------------------------------------------------------
# Resilience4j Rate Limiters
# ---------------------------------------------------------------------------

# consoleOutput: prevents burst output flooding stdout.
resilience4j.ratelimiter.instances.consoleOutput\
  .limit-for-period=50
resilience4j.ratelimiter.instances.consoleOutput\
  .limit-refresh-period=1s
resilience4j.ratelimiter.instances.consoleOutput\
  .timeout-duration=500ms
resilience4j.ratelimiter.instances.consoleOutput\
  .register-health-indicator=true

# kafkaPublish: limits Kafka produce throughput to protect the broker.
resilience4j.ratelimiter.instances.kafkaPublish\
  .limit-for-period=100
resilience4j.ratelimiter.instances.kafkaPublish\
  .limit-refresh-period=1s
resilience4j.ratelimiter.instances.kafkaPublish\
  .timeout-duration=2s
resilience4j.ratelimiter.instances.kafkaPublish\
  .register-health-indicator=true

# ---------------------------------------------------------------------------
# Resilience4j Retry
# ---------------------------------------------------------------------------

# consoleOutput: retry transient output failures before tripping the CB.
resilience4j.retry.instances.consoleOutput.max-attempts=3
resilience4j.retry.instances.consoleOutput.wait-duration=200ms
resilience4j.retry.instances.consoleOutput\
  .retry-exceptions=\
  com.egds.core.exception.MessageDeliveryFailureException

# kafkaPublish: exponential back-off for transient broker unavailability.
resilience4j.retry.instances.kafkaPublish.max-attempts=3
resilience4j.retry.instances.kafkaPublish.wait-duration=500ms
resilience4j.retry.instances.kafkaPublish\
  .enable-exponential-backoff=true
resilience4j.retry.instances.kafkaPublish\
  .exponential-backoff-multiplier=2
