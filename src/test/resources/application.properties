# ---------------------------------------------------------------------------
# EGDS Test Configuration
# Overrides main application.properties for all test executions.
# ---------------------------------------------------------------------------

# --- H2 (Oracle-compatibility mode) ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# spring.embedded.kafka.brokers is set automatically by @EmbeddedKafka before context load.
# Falls back to localhost:9092 for tests that do not use @EmbeddedKafka.
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=egds-test-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.egds.messaging
spring.kafka.consumer.properties.spring.json.value.default.type=com.egds.messaging.GreetingEvent

# --- Cache (in-memory, no Redis required) ---
spring.cache.type=simple

# --- JWT ---
egds.security.jwt.secret=test-secret-key-for-junit-egds-system-minimum-256-bits
egds.security.jwt.expiration=3600000

# --- Kafka Topics ---
egds.kafka.topic.greeting=egds.greeting.events.test

# H2 console disabled in test
spring.h2.console.enabled=false

# GrpcServerSecurityAutoConfiguration excluded (same reason as main application.properties)
spring.autoconfigure.exclude=net.devh.boot.grpc.server.autoconfigure.GrpcServerSecurityAutoConfiguration

# --- gRPC Server (network listener disabled; no in-process-name set globally) ---
# in-process-name is set only in GreetingGrpcServiceIntegrationTest via @SpringBootTest(properties)
# to prevent the name-already-registered conflict when multiple contexts start in the same JVM.
grpc.server.port=-1

# --- gRPC Client ---
# address=in-process:test is intentionally kept here: the channel is created lazily and is only
# exercised by GreetingGrpcServiceIntegrationTest, which also starts the matching in-process server.
grpc.client.egds-greeting-service.address=in-process:test
grpc.client.egds-greeting-service.negotiation-type=plaintext
