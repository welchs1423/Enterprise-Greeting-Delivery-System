# Service: exposes EGDS pods to external and intra-cluster traffic.
# LoadBalancer type provisions a cloud provider load balancer (AWS NLB, GCP LB, Azure LB).
# In environments without a cloud LB controller, replace with NodePort or use an Ingress.
#
# Two named ports:
#   http  (8080): Spring Boot REST API and Spring Security JWT endpoints
#   grpc  (9090): Protobuf binary RPC (GreetingService)
apiVersion: v1
kind: Service
metadata:
  name: egds-svc
  namespace: egds
  labels:
    app: egds
    version: "3.0.0"
    component: service
  annotations:
    # AWS: provision an internal NLB (remove for public-facing deployments)
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
    # Preserve client IP for audit trail (SecurityConfig extracts X-Forwarded-For)
    service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"
spec:
  type: LoadBalancer
  selector:
    app: egds
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
    - name: grpc
      protocol: TCP
      port: 9090
      targetPort: grpc
  # Client affinity is not required; the application is stateless.
  sessionAffinity: None
