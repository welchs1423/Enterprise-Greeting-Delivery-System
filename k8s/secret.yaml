# Secret: sensitive credentials isolated from ConfigMap.
#
# WARNING: This file contains base64-encoded placeholder values only.
# In production, secrets MUST be injected via an external secrets manager
# (AWS Secrets Manager, HashiCorp Vault, or Kubernetes External Secrets Operator).
# Committing real credentials to this file is a critical security violation.
#
# To encode a value:  echo -n 'value' | base64
# To decode a value:  echo 'encoded' | base64 -d
