  JWT_SECRET: UkVQTEFDRS1XSVrilvbst0RVQ1RJT04tSldULVNFQ1JFVC1NSU5JTVVNLTI1Ni1CSVRT

  # Oracle DB credentials
  # Placeholder: base64("REPLACE-WITH-PRODUCTION-DB-URL")
  DB_URL: amRiYzpvcmFjbGU6dGhpbjpALy9vcmFjbGUtc3ZjLmRiLnN2Yy5jbHVzdGVyLmxvY2FsOjE1MjEvZWdkc3Bk
  # Placeholder: base64("egds_app_user")
  DB_USERNAME: ZWdkc19hcHBfdXNlcg==
